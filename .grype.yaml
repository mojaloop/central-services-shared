    include-aliases: true
    reason: "Unfixable npm transitive vulnerability: ajv ReDoS (moderate) as of 2026-02-19"
  - vulnerability: GHSA-3ppc-4f35-3m26
    include-aliases: true
    reason: "Unfixable npm transitive vulnerability: minimatch ReDoS - fix requires v10 major version break as of 2026-02-19"
  - vulnerability: GHSA-7r86-cg39-jmmj
    include-aliases: true
    reason: "Unfixable npm transitive vulnerability: minimatch ReDoS via replace (high) as of 2026-03-30"
  - vulnerability: GHSA-23c5-xmqv-rm74
    include-aliases: true
    reason: "Unfixable npm transitive vulnerability: minimatch ReDoS via replace (high) as of 2026-03-30"
  - vulnerability: GHSA-44fc-8fm5-q62h
    include-aliases: true
    reason: "Unfixable npm transitive vulnerability: convict prototype pollution via inter-scheme-proxy-cache-lib (critical) as of 2026-03-30"
  - vulnerability: GHSA-hf2r-9gf9-rwch
    include-aliases: true
    reason: "Unfixable npm transitive vulnerability: convict prototype pollution via inter-scheme-proxy-cache-lib (critical) as of 2026-03-30"
output:
